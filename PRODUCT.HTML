<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Plant Details | GreenLeaf</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* ---------- GLOBAL ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif
        }

        body {
            background: #f6f8f5;
            color: #2f3e2f
        }

        /* ---------- NAVBAR ---------- */
        header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }

        .navbar {
            max-width: 1200px;
            margin: auto;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #3a6b35
        }

        .nav-links a {
            margin-left: 25px
        }

        /* ---------- PRODUCT ---------- */
        .product-detail {
            max-width: 1200px;
            margin: 60px auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            padding: 20px;
        }

        .product-image {
            height: 420px;
            background-size: cover;
            background-position: center;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .product-info h1 {
            font-size: 34px;
            margin-bottom: 15px
        }

        .product-info p {
            margin-bottom: 15px
        }

        .price {
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
            color: #3a6b35;
        }

        .quantity {
            margin-bottom: 20px;
        }

        .add-btn {
            padding: 12px 30px;
            background: #3a6b35;
            border: none;
            color: #fff;
            border-radius: 25px;
            cursor: pointer;
            transition: .3s;
        }

        .add-btn:hover {
            background: #2f552b;
        }

        /* ---------- FOOTER ---------- */
        footer {
            background: #2f3e2f;
            color: #fff;
            text-align: center;
            padding: 20px;
            margin-top: 60px;
        }
    </style>
</head>

<body>

    <header>
        <div class="navbar">
            <div class="logo">GreenLeaf</div>
            <nav class="nav-links">
                <a href="HOMEPAGE.HTML">Home</a>
                <a href="BROWSE.HTML">Browse Plants</a>
                <a href="AUTH.HTML" id="authLink">Login</a>
                <a href="CART.HTML">Cart</a>
            </nav>
        </div>
    </header>

    <section class="product-detail">
        <div class="product-image" id="productImage"></div>

        <div class="product-info">
            <h1 id="productName"></h1>
            <p id="productDescription"></p>

            <div class="price" id="productPrice"></div>

            <div class="quantity">
                <label>Quantity:</label>
                <input type="number" id="quantity" value="1" min="1">
            </div>

            <button class="add-btn" onclick="addToCart()">Add to Cart</button>
        </div>
    </section>

    <footer>
        <p>© 2025 GreenLeaf</p>
    </footer>

    <script>
        /* ================= GET PRODUCT ID ================= */
        const productId = localStorage.getItem("productId");

        let product = null;

        /* ================= FETCH PRODUCT ================= */
        async function loadProduct() {
            try {
                const res = await fetch(`http://localhost:5000/api/products/${productId}`);
                product = await res.json();

                displayProduct();

            } catch {
                document.body.innerHTML = "<h2 style='text-align:center'>Product not found</h2>";
            }
        }

        /* ================= DISPLAY ================= */
        function displayProduct() {

            const imgSrc = product.image.startsWith("http")
                ? product.image
                : `/images/${product.image}`;

            document.getElementById("productImage").style.backgroundImage =
                `url('${imgSrc}')`;

            document.getElementById("productName").innerText =
                product.name;

            document.getElementById("productDescription").innerText =
                product.description;

            document.getElementById("productPrice").innerText =
                `₹${product.price}`;
        }

        /* ================= CART ================= */
        function addToCart() {
            const qty = parseInt(document.getElementById("quantity").value);

            let cart = JSON.parse(localStorage.getItem("cart")) || [];

            const existing = cart.find(item => item.id === product.id);

            if (existing) {
                existing.qty += qty;
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    image: product.image,
                    qty: qty
                });
            }

            localStorage.setItem("cart", JSON.stringify(cart));
            alert("Added to cart");
        }

        /* ================= AUTH ================= */
        const user = JSON.parse(localStorage.getItem("authUser"));
        const authLink = document.getElementById("authLink");

        if (user && user.name) {
            authLink.innerText = "Hi, " + user.name;

            authLink.onclick = () => {
                localStorage.clear();
                window.location.href = "AUTH.HTML";
            };
        } else {
            authLink.innerText = "Login / Sign Up";
        }

        /* INIT */
        loadProduct();

    </script>

</body>

</html>
