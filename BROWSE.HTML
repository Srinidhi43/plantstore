<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Browse Plants | GreenLeaf</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* ---------- GLOBAL ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif
        }

        body {
            background: #f6f8f5;
            color: #2f3e2f
        }

        /* ---------- NAVBAR ---------- */
        header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar {
            max-width: 1200px;
            margin: auto;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #3a6b35
        }

        .nav-links a {
            margin-left: 25px;
            transition: .3s
        }

        .nav-links a:hover {
            color: #3a6b35
        }

        /* ---------- TITLE ---------- */
        .page-title {
            text-align: center;
            padding: 50px 20px;
        }

        .page-title h1 {
            font-size: 34px
        }

        /* ---------- GRID ---------- */
        .product-section {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
        }

        /* ---------- CARD ---------- */
        .product-card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.15);
        }

        /* ---------- IMAGE ---------- */
        .product-image {
            height: 220px;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .product-card:hover img {
            transform: scale(1.1);
        }

        /* ---------- INFO ---------- */
        .product-info {
            padding: 20px;
        }

        .product-info h3 {
            margin-bottom: 6px;
            font-size: 18px;
        }

        .price {
            font-weight: bold;
            margin: 8px 0;
            color: #2e7d32;
        }

        /* ---------- BUTTON ---------- */
        .product-info button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #3a6b35, #2f552b);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .product-info button:hover {
            transform: scale(1.05);
        }

        /* ---------- LOADER ---------- */
        .loader {
            text-align: center;
            padding: 40px;
            font-size: 18px;
        }

        /* ---------- FOOTER ---------- */
        footer {
            background: #2f3e2f;
            color: #fff;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
        }
    </style>
</head>

<body>

    <header>
        <div class="navbar">
            <div class="logo">GreenLeaf</div>
            <nav class="nav-links">
                <a href="HOMEPAGE.HTML">Home</a>
                <a href="BROWSE.HTML">Browse Plants</a>
                <a href="AUTH.HTML" id="authLink">Login</a>
                <a href="CART.HTML">Cart</a>
            </nav>
        </div>
    </header>

    <section class="page-title">
        <h1>Browse Plants 🌿</h1>
        <p>Choose from our wide range</p>
    </section>

    <section class="product-section">
        <div id="productGrid" class="product-grid">
            <div class="loader">Loading plants...</div>
        </div>
    </section>

    <footer>
        <p>© 2025 GreenLeaf</p>
    </footer>

    </footer>

    <script>

        const productGrid = document.getElementById("productGrid");
        let products = [];

        /* ================= FETCH PRODUCTS ================= */
        async function loadProducts() {
            try {
                const res = await fetch("http://localhost:5000/api/products");
                products = await res.json();
                displayProducts();
            } catch (err) {
                productGrid.innerHTML = "<p>Error loading products</p>";
            }
        }

        /* ================= DISPLAY ================= */
        function displayProducts() {
            productGrid.innerHTML = "";

            products.forEach(product => {

                const imgSrc = product.image.startsWith("http")
                    ? product.image
                    : `/images/${product.image}`;

                productGrid.innerHTML += `
        <div class="product-card" onclick="viewProduct(${product.id})">

            <div class="product-image">
                <img src="${imgSrc}" alt="${product.name}">
            </div>

            <div class="product-info">
                <h3>${product.name}</h3>
                <p>${product.description}</p>
                <div class="price">₹${product.price}</div>

                <button onclick="event.stopPropagation(); addToCart(${product.id})">
                    Add to Cart
                </button>
            </div>

        </div>
        `;
            });
        }

        /* ================= PRODUCT PAGE NAV ================= */
        function viewProduct(id) {
            localStorage.setItem("productId", id);
            window.location.href = "PRODUCT.HTML";
        }

        /* ================= CART ================= */
        function addToCart(productId) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];

            const product = products.find(p => p.product_id === productId);
            const existing = cart.find(item => item.product_id === productId);

            if (existing) {
                existing.qty += 1;
            } else {
                cart.push({ ...product, qty: 1 });
            }

            localStorage.setItem("cart", JSON.stringify(cart));
            alert("Added to cart");
        }

        /* ================= AUTH ================= */
        const user = JSON.parse(localStorage.getItem("authUser"));
        const authLink = document.getElementById("authLink");

        if (user && user.name) {
            authLink.innerText = "Hi, " + user.name;

            authLink.onclick = () => {
                localStorage.clear();
                window.location.href = "AUTH.HTML";
            };
        } else {
            authLink.innerText = "Login / Sign Up";
        }

        /* INIT */
        loadProducts();

    </script>

</body>

</html>
