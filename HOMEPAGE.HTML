<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>GreenLeaf | Online Plant Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            background: #f6f8f5;
            color: #2f3e2f;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            border-bottom: 1px solid #eee;
        }

        .navbar {
            max-width: 1200px;
            margin: auto;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            color: #3a6b35;
        }

        .nav-links a {
            margin-left: 25px;
        }

        .banner {
            height: 85vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background:
                linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
                url("https://images.unsplash.com/photo-1501004318641-b39e6451bec6") center/cover;
            color: white;
        }

        .banner-content h1 {
            font-size: 52px;
            margin-bottom: 15px;
        }

        .banner-content button {
            padding: 14px 30px;
            background: #3a6b35;
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }

        .categories {
            padding: 70px 20px;
            max-width: 1200px;
            margin: auto;
        }

        h2 {
            text-align: center;
            margin-bottom: 40px;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
        }

        .category-card {
            background: white;
            padding: 35px;
            border-radius: 12px;
            text-align: center;
        }

        .featured {
            background: white;
            padding: 70px 20px;
        }

        .plant-grid {
            max-width: 1200px;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .plant-grid img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 12px;
            display: block;
            transition: transform 0.3s ease;
        }

        .plant-grid img:hover {
            transform: scale(1.05);
        }


        .price {
            font-weight: bold;
            margin-top: 10px;
        }

        footer {
            background: #2f3e2f;
            color: white;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>

<body>

    <header>
        <div class="navbar">
            <div class="logo">GreenLeaf</div>
            <nav class="nav-links">
                <a href="HOMEPAGE.HTML">Home</a>
                <a href="BROWSE.HTML">Browse Plants</a>
                <a href="AUTH.HTML" id="authLink">Login</a>
                <a href="CART.HTML">Cart</a>
            </nav>
        </div>
    </header>

    <section class="banner">
        <div class="banner-content">
            <h1>Bring Nature Home 🌿</h1>
            <button onclick="browsePlants()">Browse Plants</button>
        </div>
    </section>

    <section class="categories">
        <h2>Plant Categories</h2>
        <div class="category-grid">
            <div class="category-card">Indoor Plants</div>
            <div class="category-card">Outdoor Plants</div>
            <div class="category-card">Flowering Plants</div>
            <div class="category-card">Medicinal Plants</div>
        </div>
    </section>

    <section class="featured">
        <h2>Featured Plants</h2>

        <div class="plant-grid">
            <img src="images/snake-plant.jpg">
            <img src="images/aloe-vera.jpg">
            <img src="images/money-plant.jpg">
            <img src="images/peace-lily.jpg">
        </div>
    </section>

    <footer>
        <p>© 2025 GreenLeaf Plant Store</p>
    </footer>

    <script>

        /* NAVIGATION */
        function browsePlants() {
            window.location.href = "BROWSE.HTML";
        }

        /* AUTH UI */
        const user = JSON.parse(localStorage.getItem("authUser"));
        const authLink = document.getElementById("authLink");

        if (user && user.name) {
            authLink.href = "#";
            authLink.innerHTML = `
        Hi, ${user.name} 
        <span onclick="logout(event)" style="margin-left:10px;color:red;cursor:pointer;">
            Logout
        </span>
    `;
        } else {
            authLink.href = "AUTH.HTML";
            authLink.innerText = "Login / Sign Up";
        }

        function logout(event) {
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }
            localStorage.removeItem("authUser");
            localStorage.removeItem("token");
            localStorage.removeItem("role");
            window.location.href = "HOMEPAGE.HTML";
        }
        /* LOAD PRODUCTS */
        async function loadProducts() {
            try {
                const res = await fetch("http://localhost:5000/api/products");
                const products = await res.json();

                const container = document.getElementById("plantGrid");
                container.innerHTML = "";

                products.slice(0, 6).forEach(p => {
                    container.innerHTML += `
                <div class="plant-card">
                    <div class="plant-image"
                        style="background-image:url('/images/${p.image}')">
                    </div>
                    <div class="plant-info">
                        <h4>${p.product_name}</h4>
                        <div class="price">₹${p.product_cost}</div>
                    </div>
                </div>
            `;
                });

            } catch (err) {
                console.error("Error loading products", err);
            }
        }

        loadProducts();

    </script>

</body>

</html>
