<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Cart | GreenLeaf</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* ---------- GLOBAL ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif
        }

        body {
            background: #f6f8f5;
            color: #2f3e2f
        }

        /* ---------- NAVBAR ---------- */
        header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }

        .navbar {
            max-width: 1200px;
            margin: auto;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #3a6b35
        }

        .nav-links a {
            margin-left: 25px
        }

        /* ---------- CONTAINER ---------- */
        .container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 20px;
        }

        h1 {
            margin-bottom: 25px
        }

        /* ---------- CART ITEM ---------- */
        .cart-item {
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.05);
            transition: .3s;
        }

        .cart-item:hover {
            transform: translateY(-3px)
        }

        .item-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .item-img {
            width: 70px;
            height: 70px;
            background-size: cover;
            background-position: center;
            border-radius: 8px;
        }

        .controls button {
            margin: 0 5px;
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .qty-btn {
            background: #3a6b35;
            color: #fff
        }

        .remove {
            background: #c0392b;
            color: #fff
        }

        /* ---------- TOTAL ---------- */
        .total {
            text-align: right;
            font-size: 22px;
            margin-top: 20px;
            font-weight: bold;
        }

        /* ---------- CHECKOUT ---------- */
        .checkout-btn {
            display: block;
            margin-left: auto;
            margin-top: 20px;
            padding: 12px 30px;
            background: #3a6b35;
            color: #fff;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: .3s;
        }

        .checkout-btn:hover {
            background: #2f552b
        }

        /* ---------- EMPTY ---------- */
        .empty {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: gray;
        }
    </style>
</head>

<body>

    <header>
        <div class="navbar">
            <div class="logo">GreenLeaf</div>
            <nav class="nav-links">
                <a href="HOMEPAGE.HTML">Home</a>
                <a href="BROWSE.HTML">Browse</a>
                <a href="AUTH.HTML" id="authLink">Login</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <h1>Your Cart 🛒</h1>

        <div id="cartItems"></div>
        <div class="total" id="totalPrice"></div>

        <button class="checkout-btn" onclick="goCheckout()">
            Proceed to Checkout
        </button>

    </div>

    <script>

        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        const cartItems = document.getElementById("cartItems");
        const totalPrice = document.getElementById("totalPrice");

        /* ---------- RENDER ---------- */
        function renderCart() {
            cartItems.innerHTML = "";
            let total = 0;

            if (cart.length === 0) {
                cartItems.innerHTML = `<div class="empty">Your cart is empty 🌿</div>`;
                totalPrice.innerText = "";
                return;
            }

            cart.forEach((item, index) => {
                total += item.price * item.qty;

                cartItems.innerHTML += `
        <div class="cart-item">

            <div class="item-info">
                <div class="item-img" style="background-image:url('${item.image}')"></div>

                <div>
                    <strong>${item.name}</strong><br>
                    ₹${item.price} × ${item.qty}
                </div>
            </div>

            <div class="controls">
                <button class="qty-btn" onclick="changeQty(${index},1)">+</button>
                <button class="qty-btn" onclick="changeQty(${index},-1)">−</button>
                <button class="remove" onclick="removeItem(${index})">✕</button>
            </div>

        </div>
        `;
            });

            totalPrice.innerText = "Total: ₹" + total;
        }

        /* ---------- QUANTITY ---------- */
        function changeQty(index, change) {
            cart[index].qty += change;

            if (cart[index].qty <= 0) {
                cart.splice(index, 1);
            }

            localStorage.setItem("cart", JSON.stringify(cart));
            renderCart();
        }

        /* ---------- REMOVE ---------- */
        function removeItem(index) {
            cart.splice(index, 1);
            localStorage.setItem("cart", JSON.stringify(cart));
            renderCart();
        }

        /* ---------- CHECKOUT ---------- */
        function goCheckout() {
            if (cart.length === 0) {
                cartItems.innerHTML = `<div class="empty">Add items before checkout 🌿</div>`;
                return;
            }

            window.location.href = "CHECKOUTPAGE.HTML";
        }

        /* ---------- AUTH ---------- */
        const user = JSON.parse(localStorage.getItem("authUser"));
        const authLink = document.getElementById("authLink");

        if (user && user.name) {
            authLink.innerText = user.name;

            authLink.onclick = () => {
                localStorage.removeItem("authUser");
                window.location.reload();
            };

        } else {
            authLink.innerText = "Login / Sign Up";
            authLink.href = "AUTH.HTML";
        }

        renderCart();

    </script>

</body>

</html>
