<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Authentication | GreenLeaf</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #3a6b35, #6fa66f);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-container {
            background: #fff;
            width: 380px;
            padding: 35px;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, .2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px
        }

        .form-group {
            margin-bottom: 15px
        }

        .form-group label {
            display: block;
            margin-bottom: 5px
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #3a6b35;
            border: none;
            color: #fff;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn:hover {
            background: #2f552b
        }

        .toggle-text {
            text-align: center;
            margin-top: 15px;
        }

        .toggle-text span {
            color: #3a6b35;
            cursor: pointer;
            font-weight: bold;
        }

        .error {
            color: red;
            text-align: center;
            margin-top: 10px
        }

        .success {
            color: green;
            text-align: center;
            margin-top: 10px
        }

        #loginForm {
            display: none
        }
    </style>
</head>

<body>

    <div class="auth-container">

        <!-- SIGNUP -->
        <form id="signupForm">
            <h2>Create Account</h2>

            <div class="form-group">
                <label>Name</label>
                <input type="text" id="signupName">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signupEmail">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signupPassword">
            </div>

            <button class="btn">Sign Up</button>
            <div id="signupMsg"></div>

            <div class="toggle-text">
                Already have account? <span onclick="showLogin()">Login</span>
            </div>
        </form>

        <!-- LOGIN -->
        <form id="loginForm">
            <h2>Login</h2>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword">
            </div>

            <div class="form-group">
                <label>Login As</label>
                <select id="loginRole">
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <button class="btn">Login</button>
            <div id="loginMsg"></div>

            <div class="toggle-text">
                New user? <span onclick="showSignup()">Sign Up</span>
            </div>
        </form>

    </div>

    <script>

        /* ---------- ELEMENTS ---------- */
        const signupForm = document.getElementById("signupForm");
        const loginForm = document.getElementById("loginForm");

        /* ---------- TOGGLE ---------- */
        function showLogin() {
            signupForm.style.display = "none";
            loginForm.style.display = "block";
        }

        function showSignup() {
            loginForm.style.display = "none";
            signupForm.style.display = "block";
        }

        /* ---------- EMAIL VALIDATION ---------- */
        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        /* ---------- AUTO LOGIN ---------- */
        const user = JSON.parse(localStorage.getItem("authUser"));
        const role = localStorage.getItem("role");

        if (user && role) {
            if (role === "admin") {
                window.location.href = "admin-dashboard.html";
            } else {
                window.location.href = "HOMEPAGE.HTML";
            }
        }

        /* ---------- SIGNUP ---------- */
        signupForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const name = signupName.value.trim();
            const email = signupEmail.value.trim();
            const password = signupPassword.value.trim();
            const msg = document.getElementById("signupMsg");

            if (!name || !email || !password) {
                msg.innerHTML = "<div class='error'>All fields required</div>";
                return;
            }

            if (!isValidEmail(email)) {
                msg.innerHTML = "<div class='error'>Invalid email</div>";
                return;
            }

            if (password.length < 6) {
                msg.innerHTML = "<div class='error'>Password must be 6+ chars</div>";
                return;
            }

            try {
                const res = await fetch("http://localhost:5000/api/auth/signup", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    msg.innerHTML = `<div class='error'>${data.message}</div>`;
                    return;
                }

                msg.innerHTML = "<div class='success'>Signup successful! Please login.</div>";
                signupForm.reset();
                showLogin();

            } catch {
                msg.innerHTML = "<div class='error'>Server error</div>";
            }
        });

        /* ---------- LOGIN ---------- */
        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = loginEmail.value.trim();
            const password = loginPassword.value.trim();
            const role = document.getElementById("loginRole").value;
            const msg = document.getElementById("loginMsg");

            if (!email || !password) {
                msg.innerHTML = "<div class='error'>Enter email & password</div>";
                return;
            }

            try {
                const res = await fetch("http://localhost:5000/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password, role })
                });

                const data = await res.json();

                if (!res.ok) {
                    msg.innerHTML = `<div class='error'>${data.message}</div>`;
                    return;
                }

                // store user + role
                localStorage.setItem("authUser", JSON.stringify(data.user));
                localStorage.setItem("token", data.token);
                localStorage.setItem("role", role);

                msg.innerHTML = "<div class='success'>Login successful</div>";

                setTimeout(() => {
                    if (role === "admin") {
                        window.location.href = "admin-dashboard.html";
                    } else {
                        window.location.href = "HOMEPAGE.HTML";
                    }
                }, 800);

            } catch {
                msg.innerHTML = "<div class='error'>Login failed</div>";
            }
        });

    </script>

</body>

</html>
